<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Baby ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="stars"></div>
<div class="hearts"></div>

<!-- HALAMAN PEMBUKA -->

<section id="home" class="page active">

<div class="card">

<div class="bear">
🐻
</div>

<h3>✨ A Little Surprise ✨</h3>

<h1>
HEY...
<br>
THIS IS
<br>
FOR U 💖
</h1>

<p>
Aku membuat sesuatu khusus untukmu...
Semoga kamu menyukainya 🤍
</p>

<button id="openBtn">
🎁 OPEN YOUR GIFT
</button>

</div>

</section>

<!-- HALAMAN SURAT -->

<section id="letterPage" class="page">

<div class="letter">

<h1>🎂 Happy Birthday ❤️</h1>

<p id="typing"></p>

<img src="1.jpeg" class="photo">

<button id="nextBtn">
📸 Next Memory
</button>

</div>

</section>

<!-- HALAMAN GALERI -->

<section id="galleryPage" class="page">

<h1>📸 Our Memories</h1>

<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">

</div>

<button id="lastBtn">
❤️ One More
</button>

</section>

<!-- HALAMAN AKHIR -->

<section id="endPage" class="page">

<h1>
I LOVE YOU ❤️
</h1>

<p>
Thank you for coming into my life.
<br><br>
Happy Birthday My Love 🎂
</p>

</section>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
