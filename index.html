<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Birthday Film ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NETFLIX INTRO -->
<div id="intro">
  <div class="netflixLogo">N</div>
  <p>Loading Story...</p>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn">🎵</button>

<!-- BACKGROUND -->
<div class="stars"></div>
<div class="vignette"></div>

<!-- STORY WRAPPER -->
<div id="story">

  <!-- SCENE 1 -->
  <section class="scene active" id="s1">
    <h1 class="fade">This is not just a website...</h1>
    <p class="fade delay">This is a memory.</p>
    <button data-next="s2">Continue</button>
  </section>

  <!-- SCENE 2 -->
  <section class="scene" id="s2">
    <h1 class="zoom">For someone special ❤️</h1>
    <p id="typing"></p>
    <button data-next="s3">Continue</button>
  </section>

  <!-- SCENE 3 -->
  <section class="scene" id="s3">
    <h1 class="float">Our Moments</h1>
    <div class="carousel">
      <div class="card">📸</div>
      <div class="card">📸</div>
      <div class="card">📸</div>
    </div>
    <button data-next="s4">Continue</button>
  </section>

  <!-- SCENE 4 -->
  <section class="scene" id="s4">
    <h1 class="glow">I have something for you...</h1>
    <button data-next="s5">Open Gift 🎁</button>
  </section>

  <!-- SCENE 5 -->
  <section class="scene" id="s5">
    <div class="giftBox">🎁</div>
    <h2 class="fade">Happy Birthday ❤️</h2>
    <p>You are my favorite story.</p>
    <button id="replay">Replay</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
