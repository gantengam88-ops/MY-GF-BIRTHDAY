<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Birthday Experience ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     CINEMATIC INTRO LOADING
========================= -->
<div id="intro">
  <div class="logo">N</div>
  <p>Loading Memory...</p>
  <div class="loader"></div>
</div>

<!-- =========================
     AUDIO SYSTEM
========================= -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵</button>

<!-- =========================
     CINEMATIC BACKGROUND LAYERS
========================= -->
<div class="bg"></div>
<div class="vignette"></div>
<div class="grain"></div>
<div class="stars"></div>

<!-- =========================
     MAIN STORY CONTAINER
========================= -->
<div id="story">

  <!-- SCENE SYSTEM (MULTI LAYER) -->
  <section class="scene active" id="scene-1">
    <div class="content">
      <h1 class="title">Hari ini bukan hari biasa...</h1>
      <p class="subtitle">Ada sesuatu yang ingin aku tunjukkan ✨</p>
      <button class="next" data-next="scene-2">Lanjut</button>
    </div>
  </section>

  <section class="scene" id="scene-2">
    <div class="content">
      <h1 class="title">Untuk kamu ❤️</h1>
      <p class="typing" id="typingText"></p>
      <button class="next" data-next="scene-3">Lanjut</button>
    </div>
  </section>

  <section class="scene" id="scene-3">
    <div class="content">
      <h1 class="title">Kenangan kita</h1>

      <div class="gallery">
        <div class="photo">📸</div>
        <div class="photo">📸</div>
        <div class="photo">📸</div>
      </div>

      <button class="next" data-next="scene-4">Lanjut</button>
    </div>
  </section>

  <section class="scene" id="scene-4">
    <div class="content">
      <h1 class="title">Aku punya sesuatu...</h1>
      <p class="subtitle">Sebuah hadiah kecil untukmu 🎁</p>
      <button class="next" data-next="scene-5">Buka</button>
    </div>
  </section>

  <section class="scene" id="scene-5">
    <div class="content final">
      <div class="cake">🎂</div>
      <h1>Happy Birthday</h1>
      <h2>My Love ❤️</h2>
      <p>Semoga kamu selalu bahagia</p>
      <button id="restart">Replay</button>
    </div>
  </section>

</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
