<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loaderHeart">❤️</div>
  <p>Preparing Surprise...</p>
</div>

<!-- BACKGROUND EFFECT -->
<div class="stars"></div>
<div id="hearts"></div>
<div id="petals"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn">🎵</button>

<!-- PAGE WRAPPER -->
<div id="pages">

  <!-- HOME -->
  <section class="page active" id="home">
    <h1>Happy Birthday ❤️</h1>
    <p>Scroll / Klik untuk lanjut</p>
    <button class="next" data-next="letter">Open Gift 🎁</button>
  </section>

  <!-- LETTER -->
  <section class="page" id="letter">
    <h2>Untuk Kamu ❤️</h2>
    <p id="typingText"></p>
    <button class="next" data-next="playlist">Lanjut 🎵</button>
  </section>

  <!-- PLAYLIST -->
  <section class="page" id="playlist">
    <h2>Playlist 🎵</h2>
    <p>Musik spesial untuk kamu</p>
    <button class="next" data-next="final">Next ❤️</button>
  </section>

  <!-- FINAL -->
  <section class="page" id="final">
    <h1>Happy Birthday 🎂</h1>
    <p>I Love You ❤️</p>
    <button id="restart">Replay 🔄</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
