<body>

<!-- LOADING (NOT PAGE) -->
<div id="loading">
  <div class="loaderHeart">❤️</div>
  <h2>Preparing Your Surprise...</h2>
</div>

<!-- BACKGROUND -->
<div class="stars"></div>
<div id="hearts"></div>
<div id="petals"></div>
<div id="confetti"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵</button>

<!-- HOME (FORCED ACTIVE SAFE) -->
<section id="home" class="page active">
  <div class="hero">
    <div class="bear">🧸</div>
    <h1>Happy Birthday <br> My Love ❤️</h1>
    <p>Aku punya hadiah kecil untukmu ✨</p>
    <button id="openGift">🎁 Open Gift</button>
  </div>
</section>

<!-- LETTER -->
<section id="letter" class="page">
  <div class="envelope">
    <div class="envelopeTop"></div>
    <div class="paper">
      <h2>Untuk Kamu ❤️</h2>
      <div id="typingText"></div>
      <button id="nextMusic" style="display:none;">Lanjut 🎵</button>
    </div>
  </div>
</section>

<!-- PLAYLIST -->
<section id="playlist" class="page">
  <div class="card">
    <div class="musicEmoji">🎵</div>
    <h2>Playlist</h2>
    <p>Musik spesial untuk kamu ❤️</p>
    <button id="nextFinal">Terakhir ❤️</button>
  </div>
</section>

<!-- FINAL -->
<section id="final" class="page">
  <div class="card finalCard">
    <div class="cake">🎂</div>
    <h1>Happy Birthday</h1>
    <h3>My Love ❤️</h3>
    <p>Semoga kamu selalu bahagia ✨</p>
    <h2>I Love You</h2>
    <button id="restart">Replay 🔄</button>
  </div>
</section>

<script src="script.js"></script>
</body>
